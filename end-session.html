<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Support - Session Ended</title>
    
    <style>
        /* Makes sure the page itself has no margins or scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Makes the video container fill the entire screen */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Styles the video to cover its container without losing aspect ratio */
        #end-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Styles for the fallback message if the tab can't close */
        #close-message {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            font-family: sans-serif;
            font-size: 2rem;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="end-video" autoplay muted playsinline>
            <source src="animations/outro-loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="close-message">
        <p>Your session has ended.<br>You can now safely close this browser tab.</p>
    </div>
    
    <script>
        // Get a reference to the video and message elements
        const endVideo = document.getElementById('end-video');
        const closeMessage = document.getElementById('close-message');

        // Define the function to run when the video ends
        function endSession() {
            // Attempt to close the window/tab
            window.close();

            // If window.close() fails, this code will run and show the fallback message.
            closeMessage.style.display = 'flex';
        }

        // Add an event listener that calls the function when the video finishes
        endVideo.addEventListener('ended', endSession);
    </script>
</body>
</html>
