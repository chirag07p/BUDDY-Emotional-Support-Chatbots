<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy</title>
    <style>
        /* Makes sure the page itself has no margins or scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        /* Makes the video container fill the entire screen */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Styles the video to cover its container without losing aspect ratio */
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="animations/intro-loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    
    <script>
        // Get a reference to the video element
        const introVideo = document.getElementById('intro-video');

        // Define the function to navigate to the next page
        function goToBreathingQuestion() {
            window.location.href = 'breathing-question.html';
        }

        // Add an event listener that calls the function when the video ends
        introVideo.addEventListener('ended', goToBreathingQuestion);
    </script>
</body>
</html>
